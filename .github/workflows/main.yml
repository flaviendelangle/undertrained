name: Testing
on: [push]
jobs:
  e2e:
    name: "Build + E2E tests"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: undertrained
          POSTGRES_USER: undertrained
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'undertrained' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U undertrained"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-secret-not-for-production' }}
      DATABASE_URL: postgresql://undertrained:${{ secrets.CI_DB_PASSWORD || 'undertrained' }}@localhost:5432/undertrained
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install deps (with cache)
        run: pnpm install

      - name: Install playwright
        run: pnpm playwright install chromium

      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-nextjs

      - name: Push DB schema
        run: pnpm db:push

      - run: pnpm build
      - run: pnpm test-e2e

      - name: Check types
        run: pnpm tsc

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test results
          path: |
            playwright/test-results

  unit:
    name: "Unit tests + typecheck"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: undertrained
          POSTGRES_USER: undertrained
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'undertrained' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U undertrained"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET || 'ci-test-secret-not-for-production' }}
      DATABASE_URL: postgresql://undertrained:${{ secrets.CI_DB_PASSWORD || 'undertrained' }}@localhost:5432/undertrained
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install deps (with cache)
        run: pnpm install

      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-nextjs

      - run: pnpm test-unit
      - run: pnpm tsc
