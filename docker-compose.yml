services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-undertrained}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-undertrained}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-undertrained}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_MUI_X_LICENSE_KEY: ${NEXT_PUBLIC_MUI_X_LICENSE_KEY}
        # PostHog: public token is inlined into the client bundle at build time;
        # the personal API key + project id drive source-map upload during build.
        # All read from this directory's .env (same as the MUI key above).
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
        POSTHOG_API_KEY: ${POSTHOG_API_KEY}
        POSTHOG_PROJECT_ID: ${POSTHOG_PROJECT_ID}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-undertrained}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-undertrained}
    ports:
      # Bind to loopback only: Caddy reaches the app over the internal compose
      # network (app:3000); this mapping just keeps host-local tooling and the
      # deploy health check (curl localhost:3000) working without exposing the
      # app directly to the internet.
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
